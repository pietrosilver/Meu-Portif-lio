<link rel="stylesheet" href="./porti.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <div class="container">

</body>
<style>
    *, ::before, ::after {
    box-sizing:border-box;
}
html {
    font-family:Tahoma;
    background: #A7AED3;
    overflow-x: hidden;
}
.container {
    display:flex;
    justify-content: center;
    align-items: center;
    
}
.info {
    width:100dvw;
    height:100dvh;
    justify-content: center;
    align-items: center;
}
ul {
    list-style: none;
    display: flex;
    justify-content: space-around;
    gap:30px;
}
#navbar {
    font-weight: bold;
}
header {
    background-color: #00216d;
    width:100dvw;
    height:10vh;
    position: fixed;
    top:0;
z-index:1000;
}

a {
    text-decoration: none;
    color:white;
    height:100%;
}
a:hover {
    transform: scale(1.1);
    transition:0.2s;
}


#welcome-section {
    background-color:#838ABD;
    padding-top:5em;
    height: 20em;
    text-align: center;
}
#projects {
    padding-top:8em;
    background-color: #A7AED3;
    height:60em;
    text-align:center;
    display: grid;
    grid-template-areas:
    "title title"
    "img-1 img-2"
     "img-3 img-4";
}
#links {
    background-color: #838ABD;
    height:45dvh;
    padding-top:2em;
    text-align:center;
    border-bottom: 2px solid white;
}
.projects-image {
    width:80%;
    height:80%;
    border: 3px solid white;
}
figcaption {
    margin:15px auto;
    background-color: #838ABD;
    width:17em;
    color:white;
    font-weight: 800;
    border:2px solid white;

}
footer {
    text-align: center;
    height:5dvh;
    background-color: #00216d;
    color:white;
}

#social-icons {
display: flex;
justify-content:space-evenly;
margin-top: 50px;
}
section {
    max-width:100%;
}
h1, h2, p {
    color:white;
}
p {
    font-weight: 700;
}
#second-title {
    text-decoration: underline;
}
.projects-image:hover {
    transform: translateY(-10px);
    box-shadow: 1px 1px 100px white;
    transition:0.3s;
}
#profile-link {
    color:#181717;
    font-size:25px;
}
.fa-google {
    color:blue;
    font-size: 25px;
}

#profile-photo {
    width:12em;
    border-radius: 50%;
    margin:20px;
    border:2px solid white;
    animation:border-effect 3s linear infinite; 
    transition: 0.6s;
}
#profile-photo:hover {
cursor:none;
}
@keyframes border-effect {
0% {
    border-color:white;
}
10% {
    border-color:grey;
}
100% {
    border-color: white;
}
}
.fa-whatsapp {
    color:green;
    font-size:25px;
}
span {
    font-size:25px;
}
#welcome-section, #links, footer, header {
    width:100vw;
}
@media screen and (max-width:769px) {
 ul {
    margin-right:25px;
 }
 header {
    height:7vh;
    left:0;
 }
 #projects  {
display: flex;
flex-direction: column;
height:70em;
    }
    #welcome-section {
        margin-top:2.9em;
    }
    #profile-photo {
        width:6em;
    }
#links {
    margin-top:1em;
    height:35vh;
}
#links, #welcome-section, footer {
    width:100vw;
}
}
@media only screen and (orientation:landscape) and (max-width:1024px) {
    header {
        height:17dvh;
        left:0;
    }
    #links {
        height:70dvh;
        margin-top:2em;
    }
    footer {
        width:100vw;
        height:2em;
    }
    ul {
        margin-right:1em;
    }
}
</style>
</html>
